server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:shift_management}
    username: ${PGUSER:${DATABASE_USERNAME:postgres}}
    password: ${PGPASSWORD:${DATABASE_PASSWORD:postgres}}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db
    baseline-on-migrate: true

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  # 启动时自动创建表（仅开发环境）
  type-aliases-package: com.shift.management.entity

jwt:
  secret: shift-management-jwt-secret-key-2026-very-long-secret-string
  expiration: 86400000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
