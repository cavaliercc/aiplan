server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/shift_management
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: shift-management-jwt-secret-key-2026-very-long-secret-string
  expiration: 86400000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
