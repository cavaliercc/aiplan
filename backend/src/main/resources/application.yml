server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://nozomi.proxy.rlwy.net:27728/railway?sslmode=require}
    username: ${PGUSER:postgres}
    password: ${PGPASSWORD:iMGJcVfddUaRGWFhjGuekOsAzSmCbNVD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      initialization-fail-timeout: 60000
      maximum-pool-size: 5
      minimum-idle: 1
  flyway:
    enabled: false

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  # 启动时自动创建表（仅开发环境）
  type-aliases-package: com.shift.management.entity

jwt:
  secret: shift-management-jwt-secret-key-2026-very-long-secret-string
  expiration: 86400000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
